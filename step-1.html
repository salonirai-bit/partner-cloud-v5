<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - Partner Cloud Configuration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }

    .shell { display: flex; flex-direction: column; width: 100%; height: 100vh; overflow: hidden; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; height: 42px; padding: 0 16px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; }
    .header-center { display: flex; align-items: center; justify-content: center; flex: 1; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .search-bar { display: flex; align-items: center; height: 32px; width: 400px; border: 1px solid #e5e5e5; border-radius: 4px; background: #fff; overflow: hidden; }
    .search-scope { display: flex; align-items: center; padding: 0 10px; height: 100%; font-size: 12px; color: #3e3e3c; border-right: 1px solid #e5e5e5; }
    .search-input { flex: 1; height: 100%; border: none; outline: none; font-size: 13px; padding: 0 10px; font-family: inherit; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .avatar-circle { width: 28px; height: 28px; border-radius: 50%; background: #032e61; display: flex; align-items: center; justify-content: center; }

    /* Navbar */
    .navbar { display: flex; align-items: center; height: 40px; padding: 0 12px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
    .navbar-left { display: flex; align-items: center; gap: 8px; padding-right: 16px; border-right: 1px solid #e5e5e5; margin-right: 8px; }
    .navbar-title { font-size: 14px; font-weight: 700; color: #032e61; }
    .navbar-tabs { display: flex; gap: 4px; }
    .navbar-tab { padding: 8px 12px; font-size: 13px; color: #181818; text-decoration: none; border-radius: 4px; }
    .navbar-tab.active { background: #eef4ff; box-shadow: inset 0px 3px 0px 0px #1589ee; }
    .waffle-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; }

    /* Main content area */
    .main { flex: 1; display: flex; align-items: center; justify-content: center; background: #f0ecf9; overflow: hidden; }

    /* Hero card */
    .hero-card { display: flex; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 800px; width: 100%; overflow: hidden; }
    .hero-left { flex: 1; padding: 48px 40px; display: flex; flex-direction: column; gap: 16px; }
    .hero-logo svg { width: 53px; height: 37px; }
    .hero-heading { font-size: 24px; font-weight: 700; color: #03234d; line-height: 1.3; }
    .hero-desc { font-size: 15px; color: #5c5c5c; line-height: 1.6; }
    .hero-actions { display: flex; gap: 12px; margin-top: 8px; }
    .hero-later { padding: 10px 20px; background: none; border: 1px solid #d8d8d8; border-radius: 6px; font-size: 14px; color: #3e3e3c; cursor: pointer; font-family: inherit; }
    .hero-later:hover { background: #f3f3f3; }
    .hero-go { padding: 10px 24px; background: #0176D3; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; }
    .hero-go:hover { background: #0161b2; }
    .hero-right { width: 280px; background: #e9ecf8; display: flex; align-items: center; justify-content: center; }
    .hero-play { width: 56px; height: 56px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }

    /* Footer */
    .footer { display: flex; align-items: center; justify-content: space-between; height: 48px; padding: 0 20px; background: #1b2a3e; border-top: 1px solid #2d3f54; flex-shrink: 0; font-size: 12px; color: #8899aa; box-shadow: 0 -2px 8px rgba(0,0,0,0.15); }
    .footer-nav { display: flex; align-items: center; gap: 12px; }
    .footer span { color: #8899aa; }
    .footer-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid #3d5a73; border-radius: 4px; cursor: pointer; font-size: 12px; color: #ffffff; font-family: inherit; height: 28px; padding: 0 12px; }
    .footer-btn:hover { background: #0176D3; border-color: #0176D3; }
    .footer-btn:disabled { color: #556; cursor: default; border-color: #2d3f54; }
    .footer-btn:disabled:hover { background: none; }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg width="40" height="28" viewBox="0 0 61 42" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 5.3c2.7-2.8 6.4-4.5 10.5-4.5 5.5 0 10.3 3.1 12.8 7.7 2.2-1 4.6-1.5 7.2-1.5 9.7 0 17.5 7.8 17.5 17.5S65.7 42 56 42c-1.5 0-3-.2-4.4-.6-2.2 3.7-6.2 6.2-10.8 6.2-2.2 0-4.3-.6-6.1-1.6-2.3 4.4-6.9 7.5-12.2 7.5-5.1 0-9.6-2.8-12-7-1.3.4-2.7.6-4.1.6C2.9 47.1-1 43.2-1 38.4c0-3.1 1.6-5.8 4.1-7.4-.6-1.5-1-3.2-1-4.9 0-7.6 6.2-13.8 13.8-13.8 3.2 0 6.1 1.1 8.5 2.9" transform="translate(1 -0.8) scale(0.85)" fill="#0176D3"/></svg>
      </div>
      <div class="header-center">
        <div class="search-bar">
          <span class="search-scope">All</span>
          <svg width="14" height="14" viewBox="0 0 16 16" style="margin-left:10px;flex-shrink:0"><path fill="#706e6b" d="M11.4 10l4.3 4.3a1 1 0 01-1.4 1.4L10 11.4a6.5 6.5 0 111.4-1.4zM6.5 11a4.5 4.5 0 100-9 4.5 4.5 0 000 9z"/></svg>
          <input type="text" class="search-input" placeholder="Search Salesforce">
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 16 16"><path fill="#706e6b" d="M13.5 8.5l1.3-1a.5.5 0 00.1-.6l-1.2-2a.5.5 0 00-.5-.3l-1.6.5a5 5 0 00-.9-.5L10.3 3a.5.5 0 00-.5-.4H7.4a.5.5 0 00-.5.4l-.4 1.6a5 5 0 00-.9.5l-1.6-.5a.5.5 0 00-.5.3l-1.2 2a.5.5 0 00.1.6l1.3 1c0 .2 0 .3 0 .5s0 .3 0 .5l-1.3 1a.5.5 0 00-.1.6l1.2 2c.1.2.3.3.5.3l1.6-.5c.3.2.6.4.9.5l.4 1.6c0 .2.3.4.5.4h2.4c.2 0 .5-.2.5-.4l.4-1.6c.3-.1.6-.3.9-.5l1.6.5c.2.1.4 0 .5-.3l1.2-2a.5.5 0 00-.1-.6l-1.3-1c0-.2 0-.3 0-.5s0-.3 0-.5zM8.6 11a2 2 0 110-4 2 2 0 010 4z"/></svg></button>
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 16 16"><path fill="#706e6b" d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 10H7V9h2v2zm0-4H7V4h2v3z"/></svg></button>
        <div class="avatar-circle"><svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.5" fill="white"/><path d="M5.5 19.5c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5" stroke="white" stroke-width="1.5" fill="none"/></svg></div>
      </div>
    </header>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-left">
        <button class="waffle-btn"><svg width="20" height="20" viewBox="0 0 16 16"><circle cx="3" cy="3" r="1.5" fill="#706e6b"/><circle cx="8" cy="3" r="1.5" fill="#706e6b"/><circle cx="13" cy="3" r="1.5" fill="#706e6b"/><circle cx="3" cy="8" r="1.5" fill="#706e6b"/><circle cx="8" cy="8" r="1.5" fill="#706e6b"/><circle cx="13" cy="8" r="1.5" fill="#706e6b"/><circle cx="3" cy="13" r="1.5" fill="#706e6b"/><circle cx="8" cy="13" r="1.5" fill="#706e6b"/><circle cx="13" cy="13" r="1.5" fill="#706e6b"/></svg></button>
        <span class="navbar-title">Setup</span>
      </div>
      <div class="navbar-tabs">
        <a href="#" class="navbar-tab active">Home</a>
        <a href="#" class="navbar-tab">Object Manager</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main">
      <div class="hero-card">
        <div class="hero-left">
          <div class="hero-logo">
            <svg width="53" height="37" viewBox="0 0 61 42" xmlns="http://www.w3.org/2000/svg">
              <path d="M25.5 5.3c2.7-2.8 6.4-4.5 10.5-4.5 5.5 0 10.3 3.1 12.8 7.7 2.2-1 4.6-1.5 7.2-1.5 9.7 0 17.5 7.8 17.5 17.5S65.7 42 56 42c-1.5 0-3-.2-4.4-.6-2.2 3.7-6.2 6.2-10.8 6.2-2.2 0-4.3-.6-6.1-1.6-2.3 4.4-6.9 7.5-12.2 7.5-5.1 0-9.6-2.8-12-7-1.3.4-2.7.6-4.1.6C2.9 47.1-1 43.2-1 38.4c0-3.1 1.6-5.8 4.1-7.4-.6-1.5-1-3.2-1-4.9 0-7.6 6.2-13.8 13.8-13.8 3.2 0 6.1 1.1 8.5 2.9" transform="translate(1 -0.8) scale(0.85)" fill="#0176D3"/>
            </svg>
          </div>
          <h2 class="hero-heading">Sell, grow, and win with Partner Cloud</h2>
          <p class="hero-desc">We can help you set up powerful tools that uncover insights, boost collaboration, and close deals faster.</p>
          <div class="hero-actions">
            <button class="hero-later">I'll Do This Later</button>
            <button class="hero-go" id="letsGoBtn">Let's Go</button>
          </div>
        </div>
        <div class="hero-right">
          <div class="hero-play">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M8 5.5v13l11-6.5L8 5.5z" fill="#3e3e3c"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div style="display:flex;align-items:center;gap:12px;">
        <label style="font-weight:500;color:#8899aa;font-size:11px;letter-spacing:0.5px;">VERSION</label>
        <select style="font-size:12px;border:1px solid #3d5a73;border-radius:4px;padding:4px 8px;font-family:inherit;cursor:pointer;background:#2d4256;color:#ffffff;" onchange="var v=this.value;if(v==='v1')location.href='v1/index.html';if(v==='v2')location.href='v2/index.html';if(v==='v3')location.href='v3/index.html';if(v==='v4')location.href='v4/index.html';">
          <option value="v5" selected>V5 - Setup Hub</option>
          <option value="v4">V4 - Enhanced Hub</option>
          <option value="v3">V3 - Slack + MCP</option>
          <option value="v2">V2 - Feature Hub</option>
          <option value="v1">V1 - Conversational</option>
        </select>
      </div>
      <div style="color:#6b7d8e;">Last updated: June 4, 2026</div>
      <div class="footer-nav">
        <button class="footer-btn" disabled>&#8592; Prev</button>
        <span>Step 1 / 11</span>
        <button class="footer-btn" onclick="window.location.href='step-2.html'">Next &#8594;</button>
      </div>
    </footer>
  </div>

  <script>
    document.getElementById('letsGoBtn').addEventListener('click', () => {
      window.location.href = 'step-2.html';
    });
  </script>
</body>
</html>
