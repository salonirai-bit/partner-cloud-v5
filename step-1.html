<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - Partner Cloud Configuration</title>
  <link rel="stylesheet" href="https://unpkg.com/@salesforce-ux/design-system@2/assets/styles/salesforce-lightning-design-system.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }

    .shell { display: flex; flex-direction: column; width: 100%; height: 100vh; overflow: hidden; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; height: 42px; padding: 0 16px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; }
    .header-center { display: flex; align-items: center; justify-content: center; flex: 1; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .search-bar { display: flex; align-items: center; height: 32px; width: 400px; border: 1px solid #e5e5e5; border-radius: 4px; background: #fff; overflow: hidden; }
    .search-scope { display: flex; align-items: center; padding: 0 10px; height: 100%; font-size: 12px; color: #3e3e3c; border-right: 1px solid #e5e5e5; }
    .search-input { flex: 1; height: 100%; border: none; outline: none; font-size: 13px; padding: 0 10px; font-family: inherit; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; } .ask-btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 12px; background: #f3f3f3; border: 1px solid #d8d8d8; border-radius: 9999px; font-size: 13px; font-weight: 500; color: #0176D3; cursor: pointer; font-family: inherit; margin-left: 8px; } .ask-btn:hover { background: #edf4ff; }
    .avatar-circle { width: 28px; height: 28px; border-radius: 50%; background: #032e61; display: flex; align-items: center; justify-content: center; }

    /* Navbar */
    .navbar { display: flex; align-items: center; height: 40px; padding: 0 12px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
    .navbar-left { display: flex; align-items: center; gap: 8px; padding-right: 16px; border-right: 1px solid #e5e5e5; margin-right: 8px; }
    .navbar-title { font-size: 14px; font-weight: 700; color: #032e61; }
    .navbar-tabs { display: flex; gap: 4px; }
    .navbar-tab { padding: 8px 12px; font-size: 13px; color: #181818; text-decoration: none; border-radius: 4px; }
    .navbar-tab.active { background: #eef4ff; box-shadow: inset 0px 3px 0px 0px #1589ee; }
    .waffle-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; }

    /* Main content area */
    .main { flex: 1; display: flex; align-items: center; justify-content: center; background: #f0ecf9; overflow: hidden; }

    /* Hero card */
    .hero-card { display: flex; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 800px; width: 100%; overflow: hidden; }
    .hero-left { flex: 1; padding: 48px 40px; display: flex; flex-direction: column; gap: 16px; }
    .hero-logo svg { width: 53px; height: 37px; }
    .hero-heading { font-size: 24px; font-weight: 700; color: #03234d; line-height: 1.3; }
    .hero-desc { font-size: 15px; color: #5c5c5c; line-height: 1.6; }
    .hero-actions { display: flex; gap: 12px; margin-top: 8px; }
    .hero-right { width: 280px; background: #e9ecf8; display: flex; align-items: center; justify-content: center; }
    .hero-play { width: 56px; height: 56px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }

    /* Footer */
    .footer { display: flex; align-items: center; justify-content: space-between; height: 48px; padding: 0 20px; background: #1b2a3e; border-top: 1px solid #2d3f54; flex-shrink: 0; font-size: 12px; color: #8899aa; box-shadow: 0 -2px 8px rgba(0,0,0,0.15); }
    .footer-nav { display: flex; align-items: center; gap: 12px; }
    .footer span { color: #8899aa; }
    .footer-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid #3d5a73; border-radius: 4px; cursor: pointer; font-size: 12px; color: #ffffff; font-family: inherit; height: 28px; padding: 0 12px; }
    .footer-btn:hover { background: #0176D3; border-color: #0176D3; }
    .footer-btn:disabled { color: #556; cursor: default; border-color: #2d3f54; }
    .footer-btn:disabled:hover { background: none; }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Global Header -->
    <header style="display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 12px;background:#ffffff;position:relative;flex-shrink:0;">
      <!-- Logo -->
      <div style="width:200px;padding:0 4px;display:flex;align-items:center;">
        <svg width="61" height="42" viewBox="0 0 61 42" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 5.3c2.7-2.8 6.4-4.5 10.5-4.5 5.5 0 10.3 3.1 12.8 7.7 2.2-1 4.6-1.5 7.2-1.5 9.7 0 17.5 7.8 17.5 17.5S65.7 42 56 42c-1.5 0-3-.2-4.4-.6-2.2 3.7-6.2 6.2-10.8 6.2-2.2 0-4.3-.6-6.1-1.6-2.3 4.4-6.9 7.5-12.2 7.5-5.1 0-9.6-2.8-12-7-1.3.4-2.7.6-4.1.6C2.9 47.1-1 43.2-1 38.4c0-3.1 1.6-5.8 4.1-7.4-.6-1.5-1-3.2-1-4.9 0-7.6 6.2-13.8 13.8-13.8 3.2 0 6.1 1.1 8.5 2.9" transform="translate(1 -0.8) scale(0.85)" fill="#00A1E0"/></svg>
      </div>
      <!-- Search + Ask (centered) -->
      <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:center;">
        <div style="display:flex;align-items:center;height:32px;width:360px;border:1px solid #d8d8d8;border-radius:4px;background:#fff;padding:0 12px;">
          <svg width="16" height="16" viewBox="0 0 16 16" style="flex-shrink:0;"><path fill="#706e6b" d="M11.4 10l4.3 4.3a1 1 0 01-1.4 1.4L10 11.4a6.5 6.5 0 111.4-1.4zM6.5 11a4.5 4.5 0 100-9 4.5 4.5 0 000 9z"/></svg>
          <input type="text" placeholder="Search..." style="flex:1;border:none;outline:none;font-size:14px;padding:0 8px;font-family:inherit;color:#3e3e3c;">
        </div>
        <button style="display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 16px;background:#ffffff;border:1px solid #5c5c5c;border-radius:9999px;font-size:14px;font-weight:590;color:#0250d9;cursor:pointer;font-family:inherit;white-space:nowrap;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.5 3.5L13 6l-3.5 1.5L8 11l-1.5-3.5L3 6l3.5-1.5L8 1z" fill="#0250d9"/></svg>
          Ask
        </button>
      </div>
      <!-- Right Icons -->
      <div style="display:flex;align-items:center;gap:16px;padding:0 16px;">
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#5bc2e7"/><path d="M12 17c-2.8 0-5-2.2-5-5h2c0 1.7 1.3 3 3 3s3-1.3 3-3h2c0 2.8-2.2 5-5 5z" fill="#fff"/><circle cx="9" cy="10" r="1.5" fill="#fff"/><circle cx="15" cy="10" r="1.5" fill="#fff"/></svg></button>
        <div style="display:flex;align-items:center;">
          <button style="display:flex;align-items:center;justify-content:center;padding:5px;background:#fff;border:1px solid #5c5c5c;border-radius:9999px 0 0 9999px;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 16 16"><path fill="#5c5c5c" d="M8 1l1.8 4.2L14 6.5l-3 3.2.7 4.8L8 12.3 4.3 14.5l.7-4.8-3-3.2 4.2-1.3L8 1z"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:5px;background:#fff;border:1px solid #5c5c5c;border-left:none;border-radius:0 9999px 9999px 0;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 16 16"><path fill="#5c5c5c" d="M4 6l4 4 4-4"/></svg></button>
        </div>
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5c5c5c" d="M12 2a1 1 0 011 1v8h8a1 1 0 110 2h-8v8a1 1 0 11-2 0v-8H3a1 1 0 110-2h8V3a1 1 0 011-1z"/></svg></button>
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5c5c5c" d="M12 2C8.1 2 5 5.1 5 9v4l-2 3h6.1c.5 1.7 2 3 3.9 3s3.4-1.3 3.9-3H23l-2-3V9c0-3.9-3.1-7-7-7zm0 16c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2z"/></svg></button>
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5c5c5c" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></button>
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5c5c5c" d="M20.8 13.2l-1.6-1.2c0-.3.1-.7.1-1s0-.7-.1-1l1.6-1.2c.3-.2.3-.5.2-.8l-1.5-2.6c-.2-.3-.5-.4-.8-.3l-1.9.7c-.5-.4-1.1-.7-1.7-.9L15 3.1c0-.3-.3-.6-.7-.6h-3c-.4 0-.6.3-.7.6l-.3 2c-.6.2-1.2.6-1.7.9l-1.9-.7c-.3-.1-.6 0-.8.3L4.5 8.2c-.2.3-.1.6.2.8l1.6 1.2c0 .3-.1.7-.1 1s0 .7.1 1l-1.6 1.2c-.3.2-.3.5-.2.8l1.5 2.6c.2.3.5.4.8.3l1.9-.7c.5.4 1.1.7 1.7.9l.3 2c0 .3.3.6.7.6h3c.4 0 .6-.3.7-.6l.3-2c.6-.2 1.2-.6 1.7-.9l1.9.7c.3.1.6 0 .8-.3l1.5-2.6c.1-.3 0-.6-.2-.8zM12.5 15c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3z"/></svg></button>
        <button style="background:none;border:none;cursor:pointer;padding:0;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5c5c5c" d="M18 8c0-3.3-2.7-6-6-6S6 4.7 6 8c0 3 2.2 5.5 5 5.9V16H9v2h2v3h2v-3h2v-2h-2v-2.1c2.8-.4 5-2.9 5-5.9z"/></svg></button>
        <div style="width:32px;height:32px;border-radius:50%;background:#032e61;display:flex;align-items:center;justify-content:center;cursor:pointer;"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.5" fill="white"/><path d="M5.5 19.5c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5" stroke="white" stroke-width="1.5" fill="none"/></svg></div>
      </div>
    </header>

    <!-- Global Navigation -->
    <nav style="display:flex;align-items:center;justify-content:space-between;height:40px;padding:4px 0;padding-right:24px;background:#ffffff;box-shadow:0 -1px 1px rgba(0,0,0,0.05),0 1.4px 1.5px rgba(0,0,0,0.09),0 0 1.49px rgba(0,0,0,0.09);flex-shrink:0;position:relative;z-index:1;">
      <div style="display:flex;align-items:center;flex:1;min-width:0;padding-right:24px;">
        <!-- App name -->
        <div style="display:flex;align-items:center;gap:16px;height:32px;padding:0 24px 0 12px;max-width:320px;">
          <svg width="20" height="20" viewBox="0 0 20 20"><rect x="1" y="1" width="5" height="5" rx="1" fill="#706e6b"/><rect x="8" y="1" width="5" height="5" rx="1" fill="#706e6b"/><rect x="15" y="1" width="5" height="5" rx="1" fill="#706e6b"/><rect x="1" y="8" width="5" height="5" rx="1" fill="#706e6b"/><rect x="8" y="8" width="5" height="5" rx="1" fill="#706e6b"/><rect x="15" y="8" width="5" height="5" rx="1" fill="#706e6b"/><rect x="1" y="15" width="5" height="5" rx="1" fill="#706e6b"/><rect x="8" y="15" width="5" height="5" rx="1" fill="#706e6b"/><rect x="15" y="15" width="5" height="5" rx="1" fill="#706e6b"/></svg>
          <span style="font-size:20px;font-weight:400;color:#03234d;line-height:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Sales</span>
        </div>
        <!-- Tabs -->
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Home</a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Accounts <svg width="10" height="10" viewBox="0 0 16 16" style="vertical-align:middle;"><path fill="#706e6b" d="M4 6l4 4 4-4"/></svg></a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Contacts <svg width="10" height="10" viewBox="0 0 16 16" style="vertical-align:middle;"><path fill="#706e6b" d="M4 6l4 4 4-4"/></svg></a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Opportunities <svg width="10" height="10" viewBox="0 0 16 16" style="vertical-align:middle;"><path fill="#706e6b" d="M4 6l4 4 4-4"/></svg></a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Leads <svg width="10" height="10" viewBox="0 0 16 16" style="vertical-align:middle;"><path fill="#706e6b" d="M4 6l4 4 4-4"/></svg></a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#181818;text-decoration:none;white-space:nowrap;">Campaigns <svg width="10" height="10" viewBox="0 0 16 16" style="vertical-align:middle;"><path fill="#706e6b" d="M4 6l4 4 4-4"/></svg></a>
        <a href="#" style="padding:8px 12px;font-size:14px;color:#0176D3;text-decoration:none;white-space:nowrap;border-bottom:3px solid #0176D3;font-weight:600;">*Ask: Home <span style="margin-left:4px;color:#706e6b;cursor:pointer;">&times;</span></a>
      </div>
      <!-- Edit icon -->
      <button style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:none;border-radius:9999px;cursor:pointer;"><svg width="16" height="16" viewBox="0 0 16 16"><path fill="#706e6b" d="M11.7 1.3l3 3L5 14H2v-3l9.7-9.7zm-1.4 4.4L4 12v1h1l6.3-6.3-1-1z"/></svg></button>
    </nav>


    <!-- Main Content -->
    <div class="main">
      <div class="hero-card">
        <div class="hero-left">
          <div class="hero-logo">
            <svg width="53" height="37" viewBox="0 0 61 42" xmlns="http://www.w3.org/2000/svg">
              <path d="M25.5 5.3c2.7-2.8 6.4-4.5 10.5-4.5 5.5 0 10.3 3.1 12.8 7.7 2.2-1 4.6-1.5 7.2-1.5 9.7 0 17.5 7.8 17.5 17.5S65.7 42 56 42c-1.5 0-3-.2-4.4-.6-2.2 3.7-6.2 6.2-10.8 6.2-2.2 0-4.3-.6-6.1-1.6-2.3 4.4-6.9 7.5-12.2 7.5-5.1 0-9.6-2.8-12-7-1.3.4-2.7.6-4.1.6C2.9 47.1-1 43.2-1 38.4c0-3.1 1.6-5.8 4.1-7.4-.6-1.5-1-3.2-1-4.9 0-7.6 6.2-13.8 13.8-13.8 3.2 0 6.1 1.1 8.5 2.9" transform="translate(1 -0.8) scale(0.85)" fill="#0176D3"/>
            </svg>
          </div>
          <h2 class="hero-heading">Sell, grow, and win with Partner Cloud</h2>
          <p class="hero-desc">We can help you set up powerful tools that uncover insights, boost collaboration, and close deals faster.</p>
          <div class="hero-actions">
            <button class="slds-button slds-button_neutral">I'll Do This Later</button>
            <button class="slds-button slds-button_brand" id="letsGoBtn">Let's Go</button>
          </div>
        </div>
        <div class="hero-right">
          <div class="hero-play">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M8 5.5v13l11-6.5L8 5.5z" fill="#3e3e3c"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div style="display:flex;align-items:center;gap:12px;">
        <label style="font-weight:500;color:#8899aa;font-size:11px;letter-spacing:0.5px;">VERSION</label>
        <select style="font-size:12px;border:1px solid #3d5a73;border-radius:4px;padding:4px 8px;font-family:inherit;cursor:pointer;background:#2d4256;color:#ffffff;" onchange="var v=this.value;if(v==='v1')location.href='v1/index.html';if(v==='v2')location.href='v2/index.html';if(v==='v3')location.href='v3/index.html';if(v==='v4')location.href='v4/index.html';">
          <option value="v5" selected>V5 - Setup Hub</option>
          <option value="v4">V4 - Enhanced Hub</option>
          <option value="v3">V3 - Slack + MCP</option>
          <option value="v2">V2 - Feature Hub</option>
          <option value="v1">V1 - Conversational</option>
        </select>
      </div>
      <div style="color:#6b7d8e;">Last updated: June 4, 2026</div>
      <div class="footer-nav">
        <button class="slds-button slds-button_neutral footer-btn" disabled>&#8592; Prev</button>
        <span>Step 1 / 11</span>
        <button class="slds-button slds-button_neutral footer-btn" onclick="window.location.href='step-2.html'">Next &#8594;</button>
      </div>
    </footer>
  </div>

  <script>
    document.getElementById('letsGoBtn').addEventListener('click', () => {
      window.location.href = 'step-2.html';
    });
  </script>
</body>
</html>
