<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V3 — Screen 6: MCP User Asks Training Tracks</title>
<link rel="stylesheet" href="v3.css">
</head>
<body>
<div class="v3-shell">
  <div class="v3-content">
    <div class="v3-sf">
      <div class="v3-sf-header">
        <span>Setup &gt; Partner Cloud Configuration</span>
        <h2>Partner Cloud Configuration</h2>
      </div>
      <div class="v3-sf-body">
        <div class="v3-sf-section">
          <h3>Deal Registration Settings</h3>
          <div class="v3-placeholder"></div>
          <div class="v3-placeholder"></div>
        </div>
        <div class="v3-sf-section">
          <h3>Territory Rules</h3>
          <div class="v3-placeholder"></div>
          <div class="v3-placeholder lg"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- MCP Panel -->
  <div class="v3-mcp">
    <div class="v3-mcp-header">
      <span>&#10024; Setup Assistant</span>
      <span style="cursor:pointer; color:#999;">&#8211;</span>
    </div>
    <div class="v3-mcp-body">
      <div class="mcp-msg user">Set up Training Tracks for new partner onboarding</div>
      <div class="mcp-msg agent">I'll help you configure Training Tracks. Let me navigate you to the right page...</div>
    </div>
    <div class="v3-mcp-input">Type a message...</div>
  </div>
  <div class="v3-footer">
    <select onchange="if(this.value==='v1') window.location.href='../v1-index.html'; if(this.value==='v2') window.location.href='../v2/index.html'; if(this.value==='v4') window.location.href='../v4/index.html'">
      <option value="v3" selected>V3</option>
      <option value="v1">V1</option>
      <option value="v2">V2</option>
    </select>
    <select onchange="if(this.value) window.location.href=this.value">
      <option value="">Journey: Slack to SF</option>
    </select>
    <span class="counter">6 / 14</span>
    <button onclick="window.location.href='screen-5.html'">&larr; Prev</button>
    <button onclick="window.location.href='screen-7.html'">Next &rarr;</button>
  </div>
</div>
<script>
const screens = ['index.html','screen-2.html','screen-3.html','screen-4.html','screen-5.html','screen-6.html','screen-7.html','screen-8.html','screen-9.html','screen-10.html','screen-11.html','screen-12.html','screen-13.html','screen-14.html'];
const current = 5;
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && current < screens.length - 1) window.location.href = screens[current + 1];
  if (e.key === 'ArrowLeft' && current > 0) window.location.href = screens[current - 1];
});
</script>
</body>
</html>
